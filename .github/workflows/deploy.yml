name: Deploy NestJS Backend to AWS VPS (Flow B)

on:
  push:
    branches:
      - main
    paths:
      - 'smarttransit-nest-backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Repo Name to Lowercase
        id: prep
        run: |
          IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_path=${IMAGE_PATH}" >> $GITHUB_OUTPUT

      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_path }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./smarttransit-nest-backend
          file: ./smarttransit-nest-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "smarttransit-nest-backend/docker-compose.yml"
          target: "/home/ubuntu/Projects/smart-transit/nest-backend"
          strip_components: 1

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/Projects/smart-transit/nest-backend
            
            # Write backend_env secrets to .env
            echo "${{ secrets.BACKEND_ENV }}" > .env
            
            # Append BACKEND_IMAGE variable to .env dynamically
            IMAGE_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "BACKEND_IMAGE=ghcr.io/${IMAGE_LOWER}:latest" >> .env
            
            # Authenticate Docker daemon on VPS with GHCR using the short-lived GITHUB_TOKEN
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the new image from GHCR
            docker compose pull
            
            # Restart containers using updated image
            docker compose up -d
            
            # Remove old unused images
            docker image prune -f
